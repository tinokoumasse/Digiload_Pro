# Digiload Pro — Mosquitto MQTT Broker Configuration

# ── Listeners ────────────────────────────────────────────────────────────────
# Internal only — Nginx does not proxy MQTT
# ZED Boxes connect via LAN directly on port 1883

listener 1883
allow_anonymous true

# For production with auth — uncomment and configure:
# password_file /mosquitto/config/passwd
# allow_anonymous false

# ── Persistence ───────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_timestamp true

# ── Topics used by Digiload Pro ───────────────────────────────────────────────
# digiload/gates/{gate_id}/status     ← heartbeat every 30s
# digiload/gates/{gate_id}/events     ← pallet events real-time
# digiload/missions/{id}/progress     ← progress updates
