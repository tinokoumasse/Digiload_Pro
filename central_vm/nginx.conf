worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limiting — brute force protection on login
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS main server
    server {
        listen 443 ssl;
        server_name _;

        # SSL — Option A: self-signed (generated by install_central.sh)
        ssl_certificate     /etc/nginx/certs/digiload.crt;
        ssl_certificate_key /etc/nginx/certs/digiload.key;

        # SSL — Option B: customer certificate — uncomment and update paths
        # ssl_certificate     /etc/nginx/certs/customer.crt;
        # ssl_certificate_key /etc/nginx/certs/customer.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options         "DENY"               always;
        add_header X-Content-Type-Options  "nosniff"            always;
        add_header X-XSS-Protection        "1; mode=block"      always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Block direct clip file access
        # Clips served only via signed URLs through central_app.py
        location /clips/ {
            deny all;
            return 403;
        }

        # Rate limit login endpoint
        location /login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass       http://central-app:5001;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket — SocketIO
        location /socket.io/ {
            proxy_pass         http://central-app:5001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Camera preview — MJPEG long-lived connection
        location /api/gates/ {
            proxy_pass         http://central-app:5001;
            proxy_http_version 1.1;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_buffering    off;
            proxy_read_timeout 3600s;
        }

        # All other routes
        location / {
            proxy_pass       http://central-app:5001;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            client_max_body_size 50M;
        }
    }
}
